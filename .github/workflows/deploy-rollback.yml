name: Deploy EnergyPac to VPS (via Docker Hub)

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  # ── Job 1: Build & Push on GitHub (Zero load on VPS) ──
  build-and-push:
    name: Build Image & Push to Docker Hub
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # Naya repository name use kar rahe hain: energypac_backend
          tags: ${{ secrets.DOCKER_USERNAME }}/energypac_backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Job 2: Deploy & Migrate on VPS ──
  deploy:
    name: Pull, Migrate & Restart on VPS
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: SSH and Deploy
        uses: appleboy/ssh-action@v1.2.0
        env:
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
          DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          envs: DOCKER_USERNAME,DOCKER_PASSWORD
          script: |
            set -e
            # Aapke purane script ke hisaab se VPS_PATH use kar rahe hain
            cd ${{ secrets.VPS_PATH }}

            export DOCKER_USERNAME="${DOCKER_USERNAME}"
            export DOCKER_PASSWORD="${DOCKER_PASSWORD}"

            if [ -z "$DOCKER_PASSWORD" ]; then
              echo "❌ ERROR: DOCKER_PASSWORD is empty!"
              exit 1
            fi

            echo "$DOCKER_PASSWORD" | docker login -u "$DOCKER_USERNAME" --password-stdin

            echo "--- Pulling latest EnergyPac image ---"
            docker compose -f docker-compose.yml pull

            # 🟢 NAYA STEP: Django Database Migrations run karna
            echo "--- Running Database Migrations ---"
            docker compose -f docker-compose.yml run --rm server python manage.py migrate --noinput

            echo "--- Restarting Django Server ---"
            docker compose -f docker-compose.yml up -d --remove-orphans

            echo "--- Verifying Deployment on Port 4000 ---"
            sleep 15

            # Aapke purane script ka health check endpoint (/api/docs)
            if ! curl -s -f http://localhost:4000/api/docs > /dev/null; then
              echo "❌ FAILED: App is crashing or not responding on Port 4000."
              echo "========== SERVER LOGS =========="
              docker compose -f docker-compose.yml logs server --tail=50
              exit 1
            fi

            echo "✅ Health check passed. Cleaning up..."
            docker image prune -f
